[[headers]]
  for = "/tonconnect-manifest.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  # This line is the most important: it stops the "Blue Screen" from hiding the JSON
  from = "/tonconnect-manifest.json"
  to = "/tonconnect-manifest.json"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
