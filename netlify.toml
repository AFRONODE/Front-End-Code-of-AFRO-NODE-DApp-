[[headers]]
  for = "/tonconnect-manifest.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  # Ensure the manifest is prioritized over SPA routing
  from = "/tonconnect-manifest.json"
  to = "/tonconnect-manifest.json"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
